# SecFlow — Combined Docker Compose
# Orchestrates all 5 backend microservices on a shared Docker network.
#
# Host port mapping:
#   orchestrator    → localhost:5000
#   malware-analyzer → localhost:5001
#   steg-analyzer   → localhost:5002  (container runs on 5000)
#   recon-analyzer  → localhost:5003  (container runs on 5000)
#   web-analyzer    → localhost:5005  (container runs on 5000)
#
# Steg dependencies (PostgreSQL + Redis + RQ worker) are also included.
#
# Usage:
#   cp .env.example .env      # fill in GROQ_API_KEY, VIRUSTOTAL_API_KEY
#   docker compose up --build

services:

  # ── Orchestrator ────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: secflow-orchestrator
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MALWARE_ANALYZER_URL=http://malware-analyzer:5000/api/malware-analyzer
      - STEG_ANALYZER_URL=http://steg-analyzer:5000/api/steg-analyzer
      - RECON_ANALYZER_URL=http://recon-analyzer:5000/api/Recon-Analyzer
      - WEB_ANALYZER_URL=http://web-analyzer:5000/api/web-analyzer
      - MACRO_ANALYZER_URL=http://macro-analyzer:5000/api/macro-analyzer
      - MAX_PASSES=${MAX_PASSES:-3}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./reports:/app/reports
    depends_on:
      malware-analyzer:
        condition: service_healthy
      steg-analyzer:
        condition: service_started
      recon-analyzer:
        condition: service_healthy
      web-analyzer:
        condition: service_started
      macro-analyzer:
        condition: service_started
    networks:
      - secflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Malware Analyzer ────────────────────────────────────────────────────────
  malware-analyzer:
    build:
      context: ./Malware-Analyzer
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: malware-analyzer
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - malware-uploads:/app/uploads
    networks:
      - secflow-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/malware-analyzer/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Steg Analyzer ───────────────────────────────────────────────────────────
  steg-analyzer:
    build:
      context: ./Steg-Analyzer
      dockerfile: Dockerfile
    container_name: steg-analyzer
    ports:
      - "5002:5000"
    command: ["gunicorn", "-w", "4", "-b", "0.0.0.0:5000", "secflow.utils.wsgi:application"]
    environment:
      - WEB_APP_PORT=5000
      - MAX_CONTENT_LENGTH=3145728
      - MAX_PENDING_TIME=600
      - MAX_STORE_TIME=259200
      - CLEAR_AT_RESTART=1
      - REMOVAL_MIN_AGE_SECONDS=300
      - FLASK_DEBUG=0
      - RQ_DASHBOARD_REDIS_URL=redis://steg-redis:6379/0
      - POSTGRES_DB=secflow
      - POSTGRES_USER=secflowuser
      - POSTGRES_PASSWORD=${STEG_POSTGRES_PASSWORD:-secflowpass}
      - DB_URI=postgresql://secflowuser:${STEG_POSTGRES_PASSWORD:-secflowpass}@steg-postgres:5432/secflow
      - PYTHONUNBUFFERED=1
    depends_on:
      steg-postgres:
        condition: service_healthy
      steg-initdb:
        condition: service_completed_successfully
      steg-redis:
        condition: service_started
      steg-worker:
        condition: service_started
    networks:
      - secflow-net
    restart: unless-stopped

  steg-worker:
    build:
      context: ./Steg-Analyzer
      dockerfile: Dockerfile
    container_name: steg-worker
    command: rq worker default --url redis://steg-redis:6379/0
    environment:
      - DB_URI=postgresql://secflowuser:${STEG_POSTGRES_PASSWORD:-secflowpass}@steg-postgres:5432/secflow
      - RQ_DASHBOARD_REDIS_URL=redis://steg-redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      steg-postgres:
        condition: service_healthy
      steg-initdb:
        condition: service_completed_successfully
      steg-redis:
        condition: service_started
    networks:
      - secflow-net
    restart: unless-stopped

  steg-initdb:
    build:
      context: ./Steg-Analyzer
      dockerfile: Dockerfile
    container_name: steg-initdb
    command: python -m secflow.utils.init_db
    environment:
      - DB_URI=postgresql://secflowuser:${STEG_POSTGRES_PASSWORD:-secflowpass}@steg-postgres:5432/secflow
    depends_on:
      steg-postgres:
        condition: service_healthy
    networks:
      - secflow-net
    restart: "no"

  steg-redis:
    image: redis:7
    container_name: steg-redis
    networks:
      - secflow-net
    restart: unless-stopped

  steg-postgres:
    image: postgres:14
    container_name: steg-postgres
    environment:
      - POSTGRES_DB=secflow
      - POSTGRES_USER=secflowuser
      - POSTGRES_PASSWORD=${STEG_POSTGRES_PASSWORD:-secflowpass}
    volumes:
      - steg-pgdata:/var/lib/postgresql/data
    networks:
      - secflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secflowuser -d secflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Recon Analyzer ──────────────────────────────────────────────────────────
  recon-analyzer:
    build:
      context: ./Recon-Analyzer
      dockerfile: DockerFile
    container_name: recon-analyzer
    ports:
      - "5003:5000"
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
      - NUMVERIFY_API_KEY=${NUMVERIFY_API_KEY}
      - THREATFOX_API_KEY=${THREATFOX_API_KEY}
      - ipAPI_KEY=${ipAPI_KEY}
    networks:
      - secflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/Recon-Analyzer/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Macro Analyzer ───────────────────────────────────────────────────────────
  macro-analyzer:
    build:
      context: ./macro-analyzer
      dockerfile: Dockerfile
    container_name: macro-analyzer
    ports:
      - "5006:5000"
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
    networks:
      - secflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/macro-analyzer/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Web Analyzer ─────────────────────────────────────────────────────────────
  web-analyzer:
    build:
      context: ./Web-Analyzer
      dockerfile: Dockerfile
    container_name: web-analyzer
    ports:
      - "5005:5000"
    environment:
      - PORT=5000
      - FLASK_ENV=production
      - API_TIMEOUT_LIMIT=20000
      - API_CORS_ORIGIN=*
      - API_ENABLE_RATE_LIMIT=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONUNBUFFERED=1
    networks:
      - secflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/web-analyzer/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


# ── Shared network ──────────────────────────────────────────────────────────
networks:
  secflow-net:
    driver: bridge
    name: secflow-net

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  malware-uploads:
    driver: local
  steg-pgdata:
    driver: local
